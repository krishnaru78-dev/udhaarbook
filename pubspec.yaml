name: udhaarbook
description: Kirana store udhaar management app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Ads
  google_mobile_ads: ^4.0.0
  
  # WhatsApp
  url_launcher: ^6.2.4
  
  # Shared Preferences (settings store)
  shared_preferences: ^2.2.2
  
  # In-App Purchase
  in_app_purchase: ^3.1.13
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  fonts:
    - family: AppFont
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700